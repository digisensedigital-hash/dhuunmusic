<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- ----------------------------------- -->
    <!-- Favicon / Branding -->
    <!-- ----------------------------------- -->

    <link
      rel="icon"
      type="image/png"
      href="/Dhuun.png"
    />

    <link
      rel="apple-touch-icon"
      href="/Dhuun.png"
    />

    <!-- ----------------------------------- -->

    <!-- ----------------------------------- -->

    <meta
      name="theme-color"

      name="mobile-web-app-capable"

    <meta
      name="apple-mobile-web-app-capable"

    />
